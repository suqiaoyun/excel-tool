<!DOCTYPE html>
<html>
<head>
    <title>远致集团 - Excel 数据比对工具</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; color: #333; }
        .container { display: flex; gap: 20px; margin-bottom: 20px; }
        .box { border: 2px dashed #ccc; padding: 20px; flex: 1; text-align: center; border-radius: 8px; }
        #result { width: 100%; border-collapse: collapse; margin-top: 20px; }
        #result td, #result th { border: 1px solid #ddd; padding: 8px; }
        .diff { background-color: #ffcccc; color: red; font-weight: bold; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>📊 远致集团 Excel 智能比对助手</h2>
    <p>说明：请分别上传两个表格，系统将自动对比第一个工作表（Sheet）的内容差异。</p>
    <div class="container">
        <div class="box">
            <h3>标准旧表</h3>
            <input type="file" id="file1" accept=".xlsx, .xls">
        </div>
        <div class="box">
            <h3>待核对新表</h3>
            <input type="file" id="file2" accept=".xlsx, .xls">
        </div>
    </div>
    <button onclick="compareFiles()">开始比对数据</button>
    <div id="out"></div>

    <script>
        async function fileToJSON(file) {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            return XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
        }

        async function compareFiles() {
            const f1 = document.getElementById('file1').files[0];
            const f2 = document.getElementById('file2').files[0];
            if(!f1 || !f2) return alert("请同时上传两个文件！");

            const data1 = await fileToJSON(f1);
            const data2 = await fileToJSON(f2);
            
            let html = '<table id="result"><thead><tr><th>行号</th><th>旧表内容 (标准)</th><th>新表内容 (差异)</th></tr></thead><tbody>';
            const maxRows = Math.max(data1.length, data2.length);

            for(let i=0; i<maxRows; i++) {
                const row1 = JSON.stringify(data1[i] || "");
                const row2 = JSON.stringify(data2[i] || "");
                if(row1 !== row2) {
                    html += `<tr><td>第 ${i+1} 行</td><td>${row1}</td><td class="diff">${row2}</td></tr>`;
                }
            }
            html += '</tbody></table>';
            document.getElementById('out').innerHTML = data1.length === data2.length && html.indexOf('class="diff"') === -1 ? "✅ 数据完全一致！" : html;
        }
    </script>
</body>
</html>
